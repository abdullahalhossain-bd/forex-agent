# Ruff config — linting
[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long (we use 120)
    "F841",   # unused variable (common in try/except)
    "F401",   # unused import (common in __init__.py)
    "E402",   # module level import not at top (sys.path pattern)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["E402"]
"legacy/*" = ["E", "F", "W"]
